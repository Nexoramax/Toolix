<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Linear Gradient with Deep Indigo Core -->
    <linearGradient id="bg-gradient" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="50%" stop-color="#120E3D" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>

    <!-- Ambient Outer Glow Filter for Wrench -->
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <!-- Soft, elegant diffused glow -->
      <feGaussianBlur stdDeviation="3.0" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Squircle Drop Shadow for depth -->
    <filter id="squircle-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.45" />
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#2563EB" flood-opacity="0.15" />
    </filter>

    <!-- Glassmorphism Highlight Gradient -->
    <linearGradient id="border-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3" />
      <stop offset="30%" stop-color="#FFFFFF" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0" />
    </linearGradient>
  </defs>

  <!-- Pitch Black Canvas Background -->
  <rect width="512" height="512" fill="#030712" />

  <!-- The Squircle Frame with Shadows and Core Gradient -->
  <rect 
    x="16" 
    y="16" 
    width="480" 
    height="480" 
    rx="120" 
    fill="url(#bg-gradient)" 
    filter="url(#squircle-shadow)"
  />

  <!-- Glassmorphic Border Reflection Ring -->
  <rect 
    x="16" 
    y="16" 
    width="480" 
    height="480" 
    rx="120" 
    stroke="url(#border-gradient)" 
    stroke-width="3" 
    stroke-linecap="round"
  />

  <!-- Center Wrench (Lucide Path, beautifully scaled, thick outline & glow) -->
  <svg viewBox="0 0 24 24" x="112" y="112" width="288" height="288" fill="none">
    <!-- Outer Glow for the Wrench -->
    <path 
      d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" 
      stroke="#7C3AED" 
      stroke-width="2.5" 
      stroke-linecap="round" 
      stroke-linejoin="round" 
      opacity="0.8"
      filter="url(#neon-glow)"
    />
    <!-- Sharp White Crisp Core for the Wrench -->
    <path 
      d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" 
      stroke="#FFFFFF" 
      stroke-width="1.8" 
      stroke-linecap="round" 
      stroke-linejoin="round" 
    />
  </svg>
</svg>
